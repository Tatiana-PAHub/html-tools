<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris's Pages</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }
        h1 { margin-bottom: 8px; font-size: 1.5rem; }
        p.subtitle { color: #666; margin-bottom: 24px; }
        ul { list-style: none; }
        li { margin-bottom: 12px; }
        a {
            display: block;
            padding: 16px 20px;
            background: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s;
        }
        a:hover { background: #34495e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chris's Pages</h1>
        <p class="subtitle">Available on your Tailscale network</p>
        <ul>
            <li><a href="/reply-repository.html">Reply Repository - Belcaid</a></li>
        </ul>
    </div>
</body>
</html>
